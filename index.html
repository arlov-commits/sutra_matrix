<!DOCTYPE html>
<!-- Lotus Sutra Matrix · v0.4 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="version" content="v0.4">
<title>The Lotus Sūtra · Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0b0d14;
    --bg-mid: #11141d;
    --bg-elev: #161a26;
    --bg-card: #1a1f2e;
    --bg-card-hover: #1f2436;
    --line: rgba(212,175,110,0.10);
    --line-strong: rgba(212,175,110,0.22);
    --line-accent: rgba(212,175,110,0.45);
    --accent: #d4af6e;
    --accent-bright: #e8c987;
    --accent-deep: #9c7d44;
    --accent-glow: rgba(212,175,110,0.35);
    --secondary: #7fdbde;
    --secondary-bright: #b8efef;
    --secondary-deep: #4a9da0;
    --ink: #ece6d6;
    --ink-soft: #b9b3a3;
    --ink-dim: #7d7868;
    --ink-faint: #4f4d44;
    --text-scale: 1;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    font-size: calc(15px * var(--text-scale));
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 1100px 700px at 25% 0%, rgba(127,219,222,0.05), transparent 60%),
      radial-gradient(ellipse 1100px 700px at 75% 100%, rgba(212,175,110,0.06), transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .app {
    position: relative; z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 56px 40px 120px;
  }

  .crest {
    display: flex; align-items: center; gap: 12px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .crest svg { width: 22px; height: 22px; }
  .crest .divider { flex: 0 0 28px; height: 1px; background: var(--line-strong); }
  .crest .meta { color: var(--ink-dim); }

  .hero {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 28px;
    align-items: end;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
  }
  h1.title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(40px, 5.4vw, 64px);
    line-height: 1.0;
    letter-spacing: -0.015em;
    margin: 0 0 6px;
    color: var(--ink);
  }
  h1.title .ital { font-style: italic; color: var(--accent-bright); font-weight: 400; }
  .native {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--secondary);
    font-size: 20px;
    letter-spacing: 0.03em;
  }
  .stats { display: flex; gap: 24px; align-items: flex-end; }
  .stat .num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1;
    color: var(--accent-bright);
  }
  .stat .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 5px;
  }

  .controls {
    display: flex; align-items: center; gap: 18px;
    flex-wrap: wrap;
    padding: 14px 18px;
    background: var(--bg-mid);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .ctrl-group { display: flex; align-items: center; gap: 10px; }
  .ctrl-group label { color: var(--ink-dim); }
  .ctrl-divider { width: 1px; height: 18px; background: var(--line); }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 160px;
    background: transparent;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 3px;
    background: linear-gradient(90deg, var(--accent-deep), var(--accent));
    border-radius: 2px;
  }
  input[type=range]::-moz-range-track {
    height: 3px;
    background: linear-gradient(90deg, var(--accent-deep), var(--accent));
    border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px;
    background: var(--accent-bright);
    border-radius: 50%;
    margin-top: -5.5px;
    cursor: pointer;
    box-shadow: 0 0 0 2px var(--bg-mid), 0 0 8px var(--accent-glow);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--accent-bright);
    border-radius: 50%;
    border: 0;
    cursor: pointer;
    box-shadow: 0 0 0 2px var(--bg-mid), 0 0 8px var(--accent-glow);
  }
  .depth-val {
    color: var(--accent-bright);
    font-weight: 500;
    min-width: 2ch;
    text-align: center;
  }

  .toggle, .btn {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line-strong);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    transition: all 0.15s ease;
  }
  .toggle:hover, .btn:hover {
    border-color: var(--line-accent);
    color: var(--ink);
  }
  .toggle.on {
    background: rgba(212,175,110,0.10);
    border-color: var(--line-accent);
    color: var(--accent-bright);
  }

  .tree { display: flex; flex-direction: column; gap: 14px; }

  .chapter {
    background: var(--bg-mid);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .chapter:hover { border-color: var(--line-strong); }
  .chap-head {
    display: grid;
    grid-template-columns: auto auto 1fr;
    gap: 16px;
    align-items: baseline;
    padding: 18px 22px;
    cursor: pointer;
    user-select: none;
    background: linear-gradient(180deg, rgba(26,31,46,0.7), rgba(17,20,29,0.4));
    transition: background 0.15s ease;
  }
  .chap-head:hover { background: var(--bg-card-hover); }
  .chap-caret {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 14px;
    transition: transform 0.2s ease;
  }
  .chapter.open > .chap-head > .chap-caret { transform: rotate(90deg); }
  .chap-num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .chap-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    line-height: 1.2;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .chapter.open .chap-title { color: var(--accent-bright); }
  .chap-body {
    padding: 4px 22px 20px;
    border-top: 1px solid var(--line);
    display: none;
  }
  .chapter.open > .chap-body { display: block; }

  ul.nodes { list-style: none; padding: 0; margin: 0; }
  ul.nodes ul.nodes {
    margin-left: 18px;
    border-left: 1px solid var(--line);
    padding-left: 16px;
  }

  li.node { margin: 0; padding: 5px 0; position: relative; }
  li.node > .row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: default;
  }
  li.node.has-children > .row { cursor: pointer; }
  li.node.has-children > .row:hover .body { color: var(--accent-bright); }

  .caret {
    flex: 0 0 12px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    width: 12px;
    transition: transform 0.18s ease;
    user-select: none;
  }
  li.node.no-children > .row > .caret { color: var(--ink-faint); }
  li.node.has-children.open > .row > .caret { transform: rotate(90deg); }

  .label {
    flex: 0 0 auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--secondary);
    background: rgba(127,219,222,0.06);
    border: 1px solid rgba(127,219,222,0.18);
    padding: 1px 6px;
    border-radius: 3px;
    line-height: 1.5;
    margin-top: 1px;
    min-width: 32px;
    text-align: center;
  }
  body.no-sigils .label { display: none; }

  .body {
    flex: 1;
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.55;
    transition: color 0.15s ease;
  }
  li.node[data-d="1"] > .row > .body { color: var(--ink); font-weight: 500; }
  li.node[data-d="2"] > .row > .body { color: var(--ink); }

  li.node > ul.nodes { display: none; }
  li.node.open > ul.nodes { display: block; }

  .float {
    position: fixed;
    bottom: 22px;
    z-index: 50;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .float.left { left: 22px; }
  .float.right { right: 22px; }

  .pill {
    background: rgba(17,20,29,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line-strong);
    color: var(--accent);
    width: 36px; height: 36px;
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    transition: all 0.15s ease;
  }
  .pill:hover {
    border-color: var(--line-accent);
    color: var(--accent-bright);
    background: rgba(26,31,46,0.95);
  }
  .pill.hide { display: none; }
  .pill svg { width: 14px; height: 14px; }

  footer {
    margin-top: 64px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  footer .om {
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: none;
  }
  footer .src { cursor: help; }

  @media (max-width: 720px) {
    .app { padding: 32px 18px 96px; }
    .hero { grid-template-columns: 1fr; align-items: start; }
    .stats { flex-wrap: wrap; gap: 16px; }
    .controls { font-size: 10px; gap: 12px; }
    input[type=range] { width: 120px; }
    .chap-title { font-size: 18px; }
  }
</style>
</head>

<div class="app">

  <div class="crest">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <circle cx="12" cy="12" r="11"/>
      <circle cx="12" cy="12" r="7"/>
      <circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="1" x2="12" y2="23"/>
      <line x1="1" y1="12" x2="23" y2="12"/>
    </svg>
    <span>Sutra Matrix</span>
    <span class="divider"></span>
    <span class="meta">The Lotus Sūtra · Outline</span>
  </div>

  <div class="hero">
    <div>
      <h1 class="title">The <span class="ital">Lotus</span> Sūtra</h1>
      <div class="native">Saddharma­puṇḍarīka · 妙法蓮華經</div>

    <div class="stats" id="stats"></div>

  <div class="controls">
    <div class="ctrl-group">
      <label for="depth">Depth</label>
      <input id="depth" type="range" min="1" max="13" value="3" step="1">
      <span class="depth-val" id="depthVal">3</span>

    <div class="ctrl-divider"></div>
    <div class="ctrl-group">
      <button class="toggle on" id="sigilsBtn">Sigils</button>
    </div>
    <div class="ctrl-divider"></div>
    <div class="ctrl-group">
      <button class="btn" id="collapseAll">Collapse all</button>
      <button class="btn" id="exposeAll">Expose all</button>
    </div>
  </div>

  <div class="tree" id="tree"></div>

  <footer>
    <div>The Lotus Sūtra · Matrix</div>
    <div class="om">namo saddharmapuṇḍarīkasūtrāya</div>
    <div class="src" id="buildStamp" title="lotus-matrix-fixed.txt + lotus-toc.txt"></div>
  </footer>

</div>

<div class="float left">
  <button class="pill hide" id="toTop" title="Jump to top">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 12 V3 M3 7 L7 3 L11 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<div class="float right">
  <button class="pill" id="textDown" title="Decrease text size">A−</button>
  <button class="pill" id="textUp" title="Increase text size">A+</button>
</div>

<script>
  const DATA = JSON.parse(document.getElementById('sutra-data').textContent);

  const statsEl = document.getElementById('stats');
  const stats = [
    { num: DATA.stats.chapters, lbl: 'Chapters' },
    { num: DATA.stats.sections.toLocaleString(), lbl: 'Sections' },
    { num: DATA.stats.depth, lbl: 'Depth' },
  ];
  statsEl.innerHTML = stats.map(s =>
    `<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`
  ).join('');

  const built = new Date().toISOString().slice(0,10);
  document.getElementById('buildStamp').textContent = `build ${built} · ${DATA.hash}`;

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function renderNode(node) {
    const has = node.children && node.children.length > 0;
    const cls = has ? 'node has-children' : 'node no-children';
    const caret = has ? '▸' : '·';
    const label = node.label ? `<span class="label">${escapeHtml(node.label)}</span>` : '';
    const body = `<span class="body">${escapeHtml(node.body)}</span>`;
    let inner = `<div class="row"><span class="caret">${caret}</span>${label}${body}</div>`;
    if (has) {
      inner += `<ul class="nodes">${node.children.map(renderNode).join('')}</ul>`;
    }
    return `<li class="${cls}" data-d="${node.d}">${inner}</li>`;
  }
  function renderChapter(ch) {
    const items = ch.children.map(renderNode).join('');
    return `
      <section class="chapter" data-chapter="${ch.n}">
        <header class="chap-head">
          <span class="chap-caret">▸</span>
          <span class="chap-num">Chapter ${ch.n}</span>
          <span class="chap-title">${escapeHtml(ch.title)}</span>
        </header>
        <div class="chap-body">
          <ul class="nodes">${items}</ul>
        </div>
      </section>
    `;
  }
  document.getElementById('tree').innerHTML = DATA.chapters.map(renderChapter).join('');

  document.querySelectorAll('.chap-head').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });

  document.querySelectorAll('li.node.has-children > .row').forEach(r => {
    r.addEventListener('click', e => {
      e.stopPropagation();
      r.parentElement.classList.toggle('open');
    });
  });

  const depthEl = document.getElementById('depth');
  const depthVal = document.getElementById('depthVal');
  function applyDepth(d) {
    depthVal.textContent = d;
    document.querySelectorAll('.chapter').forEach(c => c.classList.toggle('open', d >= 1));
    document.querySelectorAll('li.node.has-children').forEach(li => {
      const nd = parseInt(li.dataset.d, 10);
      li.classList.toggle('open', nd < d);
    });
    document.querySelectorAll('li.node').forEach(li => {
      const nd = parseInt(li.dataset.d, 10);
      li.style.display = (nd <= d) ? '' : 'none';
    });
  }
  depthEl.addEventListener('input', e => applyDepth(parseInt(e.target.value, 10)));
  applyDepth(parseInt(depthEl.value, 10));

  const sigilsBtn = document.getElementById('sigilsBtn');
  sigilsBtn.addEventListener('click', () => {
    const on = sigilsBtn.classList.toggle('on');
    document.body.classList.toggle('no-sigils', !on);
  });

  document.getElementById('collapseAll').addEventListener('click', () => {
    document.querySelectorAll('.chapter').forEach(c => c.classList.remove('open'));
    document.querySelectorAll('li.node').forEach(li => li.classList.remove('open'));
  });
  document.getElementById('exposeAll').addEventListener('click', () => {
    const max = DATA.stats.depth;
    depthEl.value = max;
    applyDepth(max);
    document.querySelectorAll('.chapter').forEach(c => c.classList.add('open'));
    document.querySelectorAll('li.node.has-children').forEach(li => li.classList.add('open'));
  });

  const toTop = document.getElementById('toTop');
  window.addEventListener('scroll', () => {
    toTop.classList.toggle('hide', window.scrollY < 300);
  });
  toTop.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));

  const SCALE_KEY = 'lotus-matrix-text-scale';
  const root = document.documentElement;
  function setScale(s) {
    s = Math.max(0.8, Math.min(1.5, s));
    root.style.setProperty('--text-scale', s);
    localStorage.setItem(SCALE_KEY, s);
  }
  setScale(parseFloat(localStorage.getItem(SCALE_KEY) || '1'));
  document.getElementById('textUp').addEventListener('click', () => {
    const cur = parseFloat(getComputedStyle(root).getPropertyValue('--text-scale')) || 1;
    setScale(cur + 0.08);
  });
  document.getElementById('textDown').addEventListener('click', () => {
    const cur = parseFloat(getComputedStyle(root).getPropertyValue('--text-scale')) || 1;
    setScale(cur - 0.08);
  });
</script>
